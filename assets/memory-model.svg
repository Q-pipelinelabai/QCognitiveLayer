<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#6b5bd2"/>
    </marker>
    <radialGradient id="glow"><stop offset="0%" stop-color="#9a7cff" stop-opacity="0.55"/><stop offset="100%" stop-color="#9a7cff" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="960" height="520" rx="16" fill="#0e0f13"/>
  <text x="36" y="46" fill="#e6e8ee" font-size="22" font-weight="700">Izolojik memory — concept &#8594; sentence &#8594; conversation</text>
  <text x="36" y="72" fill="#8b90a0" font-size="14">A query activates concepts, spreads across the connectome, then rolls up to the most relevant conversation and its content.</text>

  <!-- QUERY -->
  <rect x="36" y="250" width="118" height="40" rx="20" fill="#1b1e26" stroke="#6b5bd2"/>
  <text x="95" y="275" fill="#e6e8ee" font-size="14" text-anchor="middle">query word</text>
  <text x="95" y="312" fill="#8b90a0" font-size="11" text-anchor="middle">exact &#8594; lemma</text>
  <text x="95" y="326" fill="#8b90a0" font-size="11" text-anchor="middle">&#8594; fuzzy</text>
  <line x1="154" y1="270" x2="214" y2="270" stroke="#6b5bd2" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============ LAYER 1: CONNECTOME (concepts + bonds) ============ -->
  <text x="250" y="120" fill="#9a7cff" font-size="13" font-weight="700">CONCEPTS (izobit nodes) + BONDS (co-occurrence)</text>
  <rect x="226" y="135" width="330" height="300" rx="12" fill="#13151b" stroke="#262a35"/>
  <!-- bonds -->
  <g stroke="#3a3f4b" stroke-width="1.5">
    <line x1="300" y1="200" x2="380" y2="240"/><line x1="380" y1="240" x2="470" y2="210"/>
    <line x1="380" y1="240" x2="350" y2="330"/><line x1="350" y1="330" x2="450" y2="360"/>
    <line x1="470" y1="210" x2="500" y2="300"/><line x1="350" y1="330" x2="280" y2="300"/>
    <line x1="500" y1="300" x2="450" y2="360"/>
  </g>
  <!-- spreading glow on the activated seed -->
  <circle cx="380" cy="240" r="46" fill="url(#glow)"/>
  <!-- nodes -->
  <g font-size="11" text-anchor="middle">
    <circle cx="380" cy="240" r="13" fill="#9a7cff"/><text x="380" y="263" fill="#cfc7ff">seed</text>
    <circle cx="300" cy="200" r="9" fill="#6b5bd2"/><circle cx="470" cy="210" r="9" fill="#6b5bd2"/>
    <circle cx="350" cy="330" r="9" fill="#6b5bd2"/><circle cx="500" cy="300" r="8" fill="#4a4f5b"/>
    <circle cx="280" cy="300" r="7" fill="#3a3f4b"/><circle cx="450" cy="360" r="8" fill="#4a4f5b"/>
  </g>
  <text x="391" y="430" fill="#8b90a0" font-size="11" text-anchor="middle">spreading activation (cohf = 1, pure graph)</text>

  <line x1="556" y1="240" x2="606" y2="200" stroke="#6b5bd2" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============ LAYER 2: SENTENCES (öbeks, π-addressed) ============ -->
  <text x="636" y="120" fill="#9a7cff" font-size="13" font-weight="700">SENTENCES (&#960;-addressed)</text>
  <g>
    <rect x="620" y="138" width="300" height="40" rx="8" fill="#1b1e26" stroke="#6b5bd2"/>
    <text x="634" y="163" fill="#e6e8ee" font-size="12">&#9679; "...Fenerbahçe maçını izledim..."</text>
    <rect x="620" y="186" width="300" height="40" rx="8" fill="#1b1e26" stroke="#6b5bd2"/>
    <text x="634" y="211" fill="#e6e8ee" font-size="12">&#9679; "...tuttuğum takım hep heyecan..."</text>
    <rect x="620" y="234" width="300" height="36" rx="8" fill="#15171d" stroke="#262a35"/>
    <text x="634" y="257" fill="#8b90a0" font-size="12">&#9675; "...bugün hava yağmurlu..."</text>
  </g>
  <text x="770" y="292" fill="#8b90a0" font-size="11" text-anchor="middle">scored by IDF saliency + length norm</text>

  <!-- roll-up arrow to conversation -->
  <line x1="770" y1="300" x2="770" y2="340" stroke="#6b5bd2" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ============ LAYER 3: CONVERSATION focus ============ -->
  <text x="636" y="362" fill="#9a7cff" font-size="13" font-weight="700">CONVERSATION (focus &#8594; full content)</text>
  <rect x="620" y="374" width="300" height="118" rx="12" fill="#1b1e26" stroke="#9a7cff" stroke-width="1.5"/>
  <text x="636" y="398" fill="#cfc7ff" font-size="12" font-weight="600">&#9733; "football chat" (3 months ago)</text>
  <text x="636" y="420" fill="#e6e8ee" font-size="11">— Fenerbahçe maçını izledim...</text>
  <text x="636" y="438" fill="#e6e8ee" font-size="11">— tuttuğum takım hep heyecan...</text>
  <text x="636" y="456" fill="#e6e8ee" font-size="11">— sarı lacivert formayı görünce...</text>
  <text x="636" y="480" fill="#8b90a0" font-size="11">whole conversation returned as context &#8594; LLM</text>
</svg>
