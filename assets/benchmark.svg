<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="680" height="380" rx="14" fill="#0e0f13"/>
  <text x="34" y="44" fill="#e6e8ee" font-size="20" font-weight="700">Recall accuracy — 500-conversation benchmark</text>
  <text x="34" y="68" fill="#8b90a0" font-size="13">50 distinct facts buried across 500 turns of chit-chat; query each, check top-5 recall</text>

  <!-- axis -->
  <line x1="80" y1="320" x2="640" y2="320" stroke="#262a35" stroke-width="2"/>
  <line x1="80" y1="110" x2="80" y2="320" stroke="#262a35" stroke-width="2"/>
  <text x="60" y="116" fill="#8b90a0" font-size="11" text-anchor="end">100%</text>
  <text x="60" y="216" fill="#8b90a0" font-size="11" text-anchor="end">50%</text>
  <text x="60" y="324" fill="#8b90a0" font-size="11" text-anchor="end">0%</text>
  <line x1="80" y1="215" x2="640" y2="215" stroke="#1b1e26" stroke-width="1"/>

  <!-- bar 1: 72% (overlap only) -->
  <rect x="150" y="169" width="90" height="151" rx="6" fill="#3a3f4b"/>
  <text x="195" y="159" fill="#e6e8ee" font-size="18" font-weight="700" text-anchor="middle">72%</text>
  <text x="195" y="342" fill="#8b90a0" font-size="12" text-anchor="middle">word overlap</text>
  <text x="195" y="358" fill="#8b90a0" font-size="12" text-anchor="middle">(IDF only)</text>

  <!-- bar 2: 96% (+ lemma + hierarchy) -->
  <rect x="310" y="119" width="90" height="201" rx="6" fill="#6b5bd2"/>
  <text x="355" y="109" fill="#e6e8ee" font-size="18" font-weight="700" text-anchor="middle">96%</text>
  <text x="355" y="342" fill="#9a7cff" font-size="12" text-anchor="middle">+ lemma</text>
  <text x="355" y="358" fill="#9a7cff" font-size="12" text-anchor="middle">+ hierarchy + fuzzy</text>

  <!-- bar 3: 100% end-to-end -->
  <rect x="470" y="110" width="90" height="210" rx="6" fill="#9a7cff"/>
  <text x="515" y="100" fill="#e6e8ee" font-size="18" font-weight="700" text-anchor="middle">100%</text>
  <text x="515" y="342" fill="#8b90a0" font-size="12" text-anchor="middle">end-to-end</text>
  <text x="515" y="358" fill="#8b90a0" font-size="12" text-anchor="middle">(LLM answer, sampled)</text>
</svg>
