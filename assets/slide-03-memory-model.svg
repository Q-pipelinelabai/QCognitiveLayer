<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif">
  <defs>
    <marker id="av" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#7c6cf0"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#4caf82"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#0d0f14"/>
  <rect width="1200" height="4" fill="#7c6cf0"/>

  <!-- TITLE -->
  <text x="60" y="62" fill="#e8eaf0" font-size="34" font-weight="800" letter-spacing="-0.5">Memory Model — Mathematics</text>
  <text x="60" y="87" fill="#5e6375" font-size="13.5">izobit unit · spreading activation · recall hierarchy</text>
  <text x="1140" y="62" fill="#252830" font-size="12" text-anchor="end">3 / 3</text>
  <line x1="60" y1="103" x2="1140" y2="103" stroke="#1a1e28"/>

  <!-- ══ COLUMN 1: Izobit Unit  x=40-400 ══ -->
  <rect x="40" y="112" width="360" height="544" rx="10" fill="#0e1018" stroke="#1e2230"/>
  <rect x="40" y="112" width="360" height="38" rx="10" fill="#17192e"/>
  <rect x="40" y="142" width="360" height="8" fill="#17192e"/>
  <text x="220" y="136" text-anchor="middle" fill="#a59fff" font-size="11" font-weight="700" letter-spacing="1">1 — THE IZOBIT UNIT</text>

  <!-- 3 components: boxes stacked vertically -->
  <text x="220" y="170" text-anchor="middle" fill="#4a5068" font-size="10.5" font-weight="600">Three layers of every concept node</text>

  <!-- MATTER -->
  <rect x="58" y="178" width="324" height="48" rx="7" fill="#141226" stroke="#7c6cf0" stroke-width="1.2"/>
  <text x="80" y="198" fill="#a59fff" font-size="11" font-weight="700">MATTER</text>
  <text x="80" y="215" fill="#5a5e70" font-size="11">the token string — lemma-normalised</text>
  <text x="336" y="206" text-anchor="middle" fill="#5040a0" font-size="22" font-weight="800">M</text>

  <!-- INFORMATION -->
  <rect x="58" y="234" width="324" height="48" rx="7" fill="#102018" stroke="#4caf82" stroke-width="1.2"/>
  <text x="80" y="254" fill="#4caf82" font-size="11" font-weight="700">INFORMATION</text>
  <text x="80" y="271" fill="#5a5e70" font-size="11">frequency · IDF energy — saliency</text>
  <text x="336" y="262" text-anchor="middle" fill="#2a7050" font-size="22" font-weight="800">I</text>

  <!-- BOND -->
  <rect x="58" y="290" width="324" height="48" rx="7" fill="#201410" stroke="#f0a030" stroke-width="1.2"/>
  <text x="80" y="310" fill="#f0a030" font-size="11" font-weight="700">BOND</text>
  <text x="80" y="327" fill="#5a5e70" font-size="11">co-occurrence weight w_ij — Hebbian</text>
  <text x="336" y="318" text-anchor="middle" fill="#804010" font-size="22" font-weight="800">B</text>

  <!-- IDF formula box -->
  <rect x="58" y="354" width="324" height="64" rx="7" fill="#101218" stroke="#2a2e42"/>
  <text x="80" y="372" fill="#6b7080" font-size="10" font-weight="700" letter-spacing="0.5">IDF ENERGY (izobit information)</text>
  <text x="220" y="394" text-anchor="middle" fill="#d0d0f0" font-size="15" font-weight="600">E(i) = log( (N+1) / df_i )</text>
  <text x="80" y="411" fill="#3a3e52" font-size="10">N = total öbeks · df_i = öbeks containing node i</text>

  <!-- Hebbian formula box -->
  <rect x="58" y="430" width="324" height="64" rx="7" fill="#101218" stroke="#2a2e42"/>
  <text x="80" y="448" fill="#6b7080" font-size="10" font-weight="700" letter-spacing="0.5">HEBBIAN BOND UPDATE</text>
  <text x="220" y="470" text-anchor="middle" fill="#d0d0f0" font-size="15" font-weight="600">Δw_ij += 1/dist(i,j)</text>
  <text x="80" y="487" fill="#3a3e52" font-size="10">bond grows with co-occurrence; closer = stronger</text>

  <!-- π-address formula box -->
  <rect x="58" y="506" width="324" height="64" rx="7" fill="#101218" stroke="#2a2e42"/>
  <text x="80" y="524" fill="#6b7080" font-size="10" font-weight="700" letter-spacing="0.5">π-ADDRESS (golden angle, non-repeating)</text>
  <text x="220" y="546" text-anchor="middle" fill="#d0d0f0" font-size="15" font-weight="600">θ_k = 2π · frac(k / φ)</text>
  <text x="80" y="563" fill="#3a3e52" font-size="10">φ = 1.618… · k = sentence creation order</text>

  <!-- column 1 bottom note -->
  <text x="220" y="596" text-anchor="middle" fill="#2a2e3e" font-size="10.5" font-style="italic">izobit: matter + information + bond</text>
  <text x="220" y="612" text-anchor="middle" fill="#222630" font-size="10">the same rule iterated at every scale</text>

  <!-- ══ COLUMN 2: Spreading Activation  x=420-780 ══ -->
  <rect x="420" y="112" width="360" height="544" rx="10" fill="#0e1018" stroke="#1e2230"/>
  <rect x="420" y="112" width="360" height="38" rx="10" fill="#17192e"/>
  <rect x="420" y="142" width="360" height="8" fill="#17192e"/>
  <text x="600" y="136" text-anchor="middle" fill="#a59fff" font-size="11" font-weight="700" letter-spacing="1">2 — SPREADING ACTIVATION</text>

  <!-- Spreading activation formula -->
  <rect x="438" y="156" width="324" height="88" rx="7" fill="#101218" stroke="#2a2e42"/>
  <text x="458" y="174" fill="#6b7080" font-size="10" font-weight="700" letter-spacing="0.5">DIFFUSION STEP (cohf = 1, pure graph)</text>
  <text x="600" y="196" text-anchor="middle" fill="#d0d0f0" font-size="13" font-weight="600">act'[i] = α · act[i]</text>
  <text x="600" y="215" text-anchor="middle" fill="#d0d0f0" font-size="13" font-weight="600">+ β · ( Σⱼ w_ij·act[j] / Σⱼ w_ij )</text>
  <text x="458" y="234" fill="#3a3e52" font-size="10">α = 0.13 (self-keep)  ·  β = 0.84 (spread)</text>

  <!-- Word resolution pipeline -->
  <text x="458" y="260" fill="#4a5068" font-size="10.5" font-weight="700" letter-spacing="0.5">WORD RESOLUTION — 3 safety nets</text>

  <!-- Step A -->
  <rect x="438" y="266" width="324" height="52" rx="6" fill="#111a24" stroke="#2a3a4a"/>
  <rect x="438" y="266" width="56" height="52" rx="6" fill="#152030"/>
  <text x="466" y="289" text-anchor="middle" fill="#5a8aa8" font-size="10" font-weight="700">EXACT</text>
  <text x="466" y="306" text-anchor="middle" fill="#3a5060" font-size="9">1st</text>
  <text x="508" y="287" fill="#8090a0" font-size="11">"running" → look up idx["running"]</text>
  <text x="508" y="304" fill="#3a4050" font-size="10.5">direct dictionary lookup</text>

  <!-- arrow -->
  <text x="600" y="329" text-anchor="middle" fill="#2a3040" font-size="14">↓  on miss</text>

  <!-- Step B -->
  <rect x="438" y="338" width="324" height="54" rx="6" fill="#111a24" stroke="#2a3a4a"/>
  <rect x="438" y="338" width="56" height="54" rx="6" fill="#152030"/>
  <text x="466" y="361" text-anchor="middle" fill="#5a8aa8" font-size="10" font-weight="700">LEMMA</text>
  <text x="466" y="377" text-anchor="middle" fill="#3a5060" font-size="9">2nd</text>
  <text x="508" y="357" fill="#8090a0" font-size="11">"running" → Zemberek → "run"</text>
  <text x="508" y="373" fill="#3a4050" font-size="10.5">"daughters" → "daughter"</text>
  <text x="508" y="387" fill="#3a4050" font-size="10">inflections collapse to same node</text>

  <!-- arrow -->
  <text x="600" y="404" text-anchor="middle" fill="#2a3040" font-size="14">↓  on miss</text>

  <!-- Step C -->
  <rect x="438" y="413" width="324" height="54" rx="6" fill="#111a24" stroke="#2a3a4a"/>
  <rect x="438" y="413" width="56" height="54" rx="6" fill="#152030"/>
  <text x="466" y="436" text-anchor="middle" fill="#5a8aa8" font-size="10" font-weight="700">FUZZY</text>
  <text x="466" y="452" text-anchor="middle" fill="#3a5060" font-size="9">3rd</text>
  <text x="508" y="431" fill="#8090a0" font-size="11">"receeve" → "receive"</text>
  <text x="508" y="447" fill="#3a4050" font-size="10.5">"Londun" → "London"</text>
  <text x="508" y="463" fill="#3a4050" font-size="10">trigram Jaccard + Levenshtein ≤ 2</text>

  <!-- Multi-hop example -->
  <rect x="438" y="480" width="324" height="80" rx="7" fill="#12141e" stroke="#303448"/>
  <text x="458" y="498" fill="#4a5068" font-size="10.5" font-weight="700" letter-spacing="0.5">MULTI-HOP SEMANTIC BRIDGE</text>
  <text x="458" y="515" fill="#6b7080" font-size="11">query: "my team"</text>
  <text x="600" y="533" text-anchor="middle" fill="#3a3e52" font-size="11">team  ——→  Arsenal  ——→  stadium</text>
  <text x="600" y="549" text-anchor="middle" fill="#3a3e52" font-size="9.5">learned bond  (co-mentioned in chat)</text>
  <text x="458" y="552" fill="#3a3e52" font-size="9">[only works if they co-occurred — see limitations]</text>

  <!-- column 2 bottom note -->
  <text x="600" y="592" text-anchor="middle" fill="#2a2e3e" font-size="10.5" font-style="italic">activation decays with hop distance</text>
  <text x="600" y="608" text-anchor="middle" fill="#222630" font-size="10">seeds pinned at 1.0 throughout all hops</text>

  <!-- ══ COLUMN 3: Recall Hierarchy  x=800-1160 ══ -->
  <rect x="800" y="112" width="360" height="544" rx="10" fill="#0e1018" stroke="#1e2230"/>
  <rect x="800" y="112" width="360" height="38" rx="10" fill="#17192e"/>
  <rect x="800" y="142" width="360" height="8" fill="#17192e"/>
  <text x="980" y="136" text-anchor="middle" fill="#a59fff" font-size="11" font-weight="700" letter-spacing="1">3 — RECALL HIERARCHY</text>

  <!-- Level boxes -->
  <text x="820" y="164" fill="#4a5068" font-size="10.5" font-weight="700" letter-spacing="0.5">THREE LEVELS — coarse to fine</text>

  <!-- Level 0: CONCEPT -->
  <rect x="818" y="170" width="322" height="52" rx="7" fill="#141226" stroke="#7c6cf0" stroke-width="1.5"/>
  <text x="838" y="191" fill="#a59fff" font-size="12" font-weight="700">CONCEPT NODE</text>
  <text x="838" y="208" fill="#5a5e70" font-size="11">izobit — carries freq, IDF energy, bonds</text>
  <text x="1126" y="202" text-anchor="end" fill="#4040a0" font-size="20" font-weight="800">N</text>

  <!-- connector -->
  <line x1="980" y1="222" x2="980" y2="234" stroke="#2a2e42" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- Level 1: SENTENCE -->
  <rect x="818" y="235" width="322" height="52" rx="7" fill="#101a14" stroke="#4caf82" stroke-width="1.5"/>
  <text x="838" y="256" fill="#4caf82" font-size="12" font-weight="700">SENTENCE  (öbek)</text>
  <text x="838" y="273" fill="#5a5e70" font-size="11">text + node ids + ts + π-address + conv</text>
  <text x="1126" y="267" text-anchor="end" fill="#206040" font-size="20" font-weight="800">S</text>

  <!-- connector -->
  <line x1="980" y1="287" x2="980" y2="299" stroke="#2a2e42" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Level 2: CONVERSATION -->
  <rect x="818" y="300" width="322" height="64" rx="7" fill="#0d1814" stroke="#4caf82" stroke-width="2"/>
  <text x="838" y="321" fill="#4caf82" font-size="12" font-weight="700">CONVERSATION</text>
  <text x="838" y="338" fill="#5a5e70" font-size="11">conv2chunk maps session → öbek ids</text>
  <text x="838" y="354" fill="#3a4050" font-size="10.5">cscore = best + 0.4 · Σ(siblings)</text>
  <text x="1126" y="340" text-anchor="end" fill="#206040" font-size="20" font-weight="800">C</text>

  <!-- Recall scoring box -->
  <rect x="818" y="380" width="322" height="86" rx="7" fill="#101218" stroke="#2a2e42"/>
  <text x="838" y="398" fill="#6b7080" font-size="10" font-weight="700" letter-spacing="0.5">SCORING FORMULA</text>
  <text x="980" y="418" text-anchor="middle" fill="#c8c4ff" font-size="12.5" font-weight="600">direct = Σ E(seed) for seeds in chunk</text>
  <text x="980" y="436" text-anchor="middle" fill="#c8c4ff" font-size="12.5" font-weight="600">assoc  = Σ act[i] · E(i)  (non-seed)</text>
  <text x="980" y="454" text-anchor="middle" fill="#d8d0f8" font-size="13" font-weight="700">score = (direct + 0.6·assoc) / √|chunk|</text>
  <text x="838" y="460" fill="#3a3e52" font-size="9.5">· recency factor</text>

  <!-- Benchmark box -->
  <rect x="818" y="480" width="322" height="100" rx="7" fill="#101218" stroke="#2a2e42"/>
  <text x="838" y="498" fill="#6b7080" font-size="10" font-weight="700" letter-spacing="0.5">BENCHMARK — 500-turn chit-chat</text>

  <!-- bar: QCognitiveLayer 96% -->
  <rect x="838" y="508" width="276" height="16" rx="4" fill="#1a1e2e"/>
  <rect x="838" y="508" width="265" height="16" rx="4" fill="#7c6cf0"/>
  <text x="838" y="521" fill="#fff" font-size="9.5" font-weight="700" dx="4">QCognitiveLayer  96%</text>

  <!-- bar: Simple RAG 71% -->
  <rect x="838" y="530" width="276" height="16" rx="4" fill="#1a1e2e"/>
  <rect x="838" y="530" width="196" height="16" rx="4" fill="#303450"/>
  <text x="838" y="543" fill="#8888aa" font-size="9.5" dx="4">Simple RAG  71%</text>

  <!-- bar: No memory 18% -->
  <rect x="838" y="552" width="276" height="16" rx="4" fill="#1a1e2e"/>
  <rect x="838" y="552" width="50"  height="16" rx="4" fill="#222430"/>
  <text x="838" y="565" fill="#555560" font-size="9.5" dx="4">No memory  18%</text>

  <text x="980" y="575" text-anchor="middle" fill="#2a2e3e" font-size="9.5">top-5 recall · 50 distinct facts buried in sessions</text>

  <!-- column 3 bottom note -->
  <text x="980" y="594" text-anchor="middle" fill="#2a2e3e" font-size="10.5" font-style="italic">months-old chats surface whole</text>
  <text x="980" y="610" text-anchor="middle" fill="#222630" font-size="10">one seed unlocks the entire conversation</text>
</svg>
