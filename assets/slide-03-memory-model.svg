<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif">
  <rect width="1200" height="675" fill="#0d0f14"/>
  <rect width="1200" height="4" fill="#7c6cf0"/>

  <!-- TITLE -->
  <text x="60" y="60" fill="#e8eaf0" font-size="32" font-weight="800">The Memory Model</text>
  <text x="60" y="88" fill="#8b90a0" font-size="14">Izoloji mathematics: izobit nodes · bond graph · π-address · spreading activation · recall scoring</text>
  <text x="1140" y="60" fill="#252830" font-size="13" text-anchor="end">slide 3 / 3</text>
  <line x1="60" y1="105" x2="1140" y2="105" stroke="#1e2028" stroke-width="1"/>

  <!-- ══════════════════════════════════ -->
  <!-- COLUMN 1: IZOBIT UNIT -->
  <!-- ══════════════════════════════════ -->
  <rect x="44" y="115" width="348" height="520" rx="10" fill="#0f1118" stroke="#252830"/>
  <rect x="44" y="115" width="348" height="40" rx="10" fill="#14172a"/>
  <rect x="44" y="143" width="348" height="12" fill="#14172a"/>
  <text x="218" y="141" fill="#a59fff" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1.5">1 — IZOBIT (the unit)</text>

  <!-- Izobit diagram - central circle -->
  <circle cx="218" cy="225" r="48" fill="#141828" stroke="#7c6cf0" stroke-width="2"/>
  <text x="218" y="220" fill="#e8eaf0" font-size="13" font-weight="700" text-anchor="middle">izobit</text>
  <text x="218" y="238" fill="#a59fff" font-size="11" text-anchor="middle">concept node</text>

  <!-- Three pillars -->
  <!-- Matter -->
  <rect x="62" y="165" width="80" height="36" rx="6" fill="#1a1c26" stroke="#3a3f58"/>
  <text x="102" y="180" fill="#8b90a0" font-size="10" font-weight="700" text-anchor="middle">MATTER</text>
  <text x="102" y="195" fill="#6b7080" font-size="10" text-anchor="middle">token string</text>
  <line x1="142" y1="183" x2="172" y2="210" stroke="#3a3f58" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Information -->
  <rect x="276" y="165" width="98" height="36" rx="6" fill="#1a1c26" stroke="#3a3f58"/>
  <text x="325" y="180" fill="#8b90a0" font-size="10" font-weight="700" text-anchor="middle">INFORMATION</text>
  <text x="325" y="195" fill="#6b7080" font-size="10" text-anchor="middle">freq · IDF score</text>
  <line x1="276" y1="183" x2="262" y2="210" stroke="#3a3f58" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Bond -->
  <rect x="155" y="280" width="126" height="36" rx="6" fill="#1a1c26" stroke="#7c6cf0" stroke-width="1"/>
  <text x="218" y="295" fill="#a59fff" font-size="10" font-weight="700" text-anchor="middle">BOND</text>
  <text x="218" y="310" fill="#6b7080" font-size="10" text-anchor="middle">co-occurrence weight</text>
  <line x1="218" y1="273" x2="218" y2="280" stroke="#7c6cf0" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- IDF Formula box -->
  <rect x="62" y="335" width="312" height="52" rx="8" fill="#0d1020" stroke="#7c6cf0" stroke-width="1"/>
  <text x="218" y="356" fill="#8b90a0" font-size="11" text-anchor="middle" font-weight="600">Izobit Energy (IDF saliency)</text>
  <text x="218" y="378" fill="#e8eaf0" font-size="15" text-anchor="middle" font-weight="700">E(i) = log( (N + 1) / df_i )</text>

  <text x="72" y="408" fill="#6b7080" font-size="11.5">N = total sentences in memory</text>
  <text x="72" y="425" fill="#6b7080" font-size="11.5">df_i = sentences containing concept i</text>
  <text x="72" y="442" fill="#6b7080" font-size="11.5">→ rare / specific concepts score HIGH</text>
  <text x="72" y="459" fill="#6b7080" font-size="11.5">→ "Elif" outweighs "the", "and", "yes"</text>

  <!-- Bond learning (Hebbian) -->
  <rect x="62" y="474" width="312" height="50" rx="8" fill="#0d1020" stroke="#4caf82" stroke-width="1"/>
  <text x="218" y="494" fill="#4caf82" font-size="11" text-anchor="middle" font-weight="600">Hebbian Bond Update</text>
  <text x="218" y="514" fill="#e8eaf0" font-size="13" text-anchor="middle" font-weight="700">Δw_ij ∝ co-occurrence / distance</text>

  <text x="72" y="540" fill="#6b7080" font-size="11.5">Concepts seen together → edge grows stronger</text>
  <text x="72" y="557" fill="#6b7080" font-size="11.5">Closer in sentence → higher weight</text>
  <text x="72" y="574" fill="#6b7080" font-size="11.5">Conv-level window (CONV_WIN=40) bridges</text>
  <text x="72" y="591" fill="#6b7080" font-size="11.5">separate sentences within same session</text>
  <text x="72" y="615" fill="#555a6a" font-size="11">degree(i) = Σ_j w_ij  →  hub suppression</text>

  <!-- ══════════════════════════════════ -->
  <!-- COLUMN 2: SPREADING ACTIVATION + π-ADDRESS -->
  <!-- ══════════════════════════════════ -->
  <rect x="412" y="115" width="364" height="520" rx="10" fill="#0f1118" stroke="#252830"/>
  <rect x="412" y="115" width="364" height="40" rx="10" fill="#14172a"/>
  <rect x="412" y="143" width="364" height="12" fill="#14172a"/>
  <text x="594" y="141" fill="#a59fff" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1.5">2 — SPREADING ACTIVATION</text>

  <!-- π-address formula -->
  <rect x="428" y="165" width="332" height="60" rx="8" fill="#0d1020" stroke="#7c6cf0" stroke-width="1"/>
  <text x="594" y="185" fill="#8b90a0" font-size="11" text-anchor="middle" font-weight="600">π-Address (golden angle ordering)</text>
  <text x="594" y="210" fill="#e8eaf0" font-size="15" text-anchor="middle" font-weight="700">θ_k = 2π · frac( k / φ )</text>
  <text x="594" y="228" fill="#555a6a" font-size="10.5" text-anchor="middle">φ = (1+√5)/2 ≈ 1.618   →   non-repeating, canonical order</text>

  <!-- Spreading activation formula -->
  <rect x="428" y="246" width="332" height="82" rx="8" fill="#0d1020" stroke="#7c6cf0" stroke-width="1"/>
  <text x="594" y="268" fill="#8b90a0" font-size="11" text-anchor="middle" font-weight="600">Spreading Activation (cohf = 1, pure graph)</text>
  <line x1="428" y1="276" x2="760" y2="276" stroke="#1e2028" stroke-width="1"/>
  <text x="594" y="297" fill="#e8eaf0" font-size="13.5" text-anchor="middle" font-weight="700">act'[i] = α · act[i] + β · ( Σⱼ wᵢⱼ · act[j] / Σⱼ wᵢⱼ )</text>
  <text x="594" y="318" fill="#555a6a" font-size="10.5" text-anchor="middle">α = 0.13 (self-keep)  ·  β = 0.84 (spread)  ·  hops = 2–7</text>

  <!-- Word resolution pipeline -->
  <text x="428" y="352" fill="#8b90a0" font-size="11" font-weight="700" letter-spacing="1">QUERY WORD RESOLUTION (3 safety nets)</text>

  <!-- Pipeline boxes -->
  <rect x="428" y="360" width="88" height="40" rx="6" fill="#1a1c26" stroke="#7c6cf0" stroke-width="1.5"/>
  <text x="472" y="376" fill="#e8eaf0" font-size="11" text-anchor="middle" font-weight="600">exact</text>
  <text x="472" y="392" fill="#8b90a0" font-size="10" text-anchor="middle">match</text>

  <line x1="516" y1="380" x2="536" y2="380" stroke="#7c6cf0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="527" y="374" fill="#555a6a" font-size="9" text-anchor="middle">miss</text>

  <rect x="536" y="360" width="98" height="40" rx="6" fill="#1a1c26" stroke="#7c6cf0" stroke-width="1.5"/>
  <text x="585" y="376" fill="#e8eaf0" font-size="11" text-anchor="middle" font-weight="600">lemma</text>
  <text x="585" y="392" fill="#8b90a0" font-size="10" text-anchor="middle">Zemberek</text>

  <line x1="634" y1="380" x2="654" y2="380" stroke="#7c6cf0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="644" y="374" fill="#555a6a" font-size="9" text-anchor="middle">miss</text>

  <rect x="654" y="360" width="106" height="40" rx="6" fill="#1a1c26" stroke="#7c6cf0" stroke-width="1.5"/>
  <text x="707" y="376" fill="#e8eaf0" font-size="11" text-anchor="middle" font-weight="600">fuzzy</text>
  <text x="707" y="392" fill="#8b90a0" font-size="10" text-anchor="middle">trigram+edit-dist</text>

  <!-- Examples -->
  <text x="472" y="418" fill="#4caf82" font-size="10.5" text-anchor="middle">"Elif"</text>
  <text x="585" y="418" fill="#4caf82" font-size="10.5" text-anchor="middle">"ablam"→"abla"</text>
  <text x="707" y="418" fill="#4caf82" font-size="10.5" text-anchor="middle">"japnya"→"japonya"</text>

  <!-- Recall scoring formula -->
  <rect x="428" y="438" width="332" height="86" rx="8" fill="#0d1020" stroke="#a59fff" stroke-width="1"/>
  <text x="594" y="458" fill="#8b90a0" font-size="11" text-anchor="middle" font-weight="600">Recall Scoring Formula</text>
  <line x1="428" y1="466" x2="760" y2="466" stroke="#1e2028" stroke-width="1"/>
  <text x="594" y="486" fill="#a59fff" font-size="11" text-anchor="middle">direct = Σ_{seed ∈ chunk}  E(seed)</text>
  <text x="594" y="502" fill="#a59fff" font-size="11" text-anchor="middle">assoc  = Σ_{i ∈ chunk}  act[i] · E(i)</text>
  <text x="594" y="519" fill="#e8eaf0" font-size="13" text-anchor="middle" font-weight="700">score = (direct + 0.6 · assoc) / √|chunk| · recency</text>

  <text x="428" y="545" fill="#6b7080" font-size="11.5">direct  → rare seed words found in chunk (strong signal)</text>
  <text x="428" y="561" fill="#6b7080" font-size="11.5">assoc   → activated but non-seed nodes (multi-hop bridge)</text>
  <text x="428" y="577" fill="#6b7080" font-size="11.5">length  → short specific sentences score higher than long ones</text>
  <text x="428" y="593" fill="#6b7080" font-size="11.5">recency → recent conversations gently boosted</text>
  <text x="428" y="615" fill="#555a6a" font-size="11">debug/system chunks filtered from surface · raw data always kept</text>

  <!-- ══════════════════════════════════ -->
  <!-- COLUMN 3: HIERARCHY + RESULTS -->
  <!-- ══════════════════════════════════ -->
  <rect x="796" y="115" width="360" height="520" rx="10" fill="#0f1118" stroke="#252830"/>
  <rect x="796" y="115" width="360" height="40" rx="10" fill="#14172a"/>
  <rect x="796" y="143" width="360" height="12" fill="#14172a"/>
  <text x="976" y="141" fill="#a59fff" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1.5">3 — HIERARCHY &amp; RECALL</text>

  <!-- Level 0: concept -->
  <rect x="872" y="165" width="208" height="36" rx="8" fill="#1a1c38" stroke="#7c6cf0" stroke-width="1.5"/>
  <text x="976" y="180" fill="#a59fff" font-size="12" text-anchor="middle" font-weight="700">CONCEPT NODE (izobit)</text>
  <text x="976" y="195" fill="#6b7080" font-size="11" text-anchor="middle">lemma · freq · degree · IDF</text>

  <line x1="976" y1="201" x2="976" y2="221" stroke="#252830" stroke-width="1.5"/>
  <text x="976" y="218" fill="#555a6a" font-size="10" text-anchor="middle">many per sentence</text>

  <!-- Level 1: sentence/öbek -->
  <rect x="812" y="224" width="328" height="54" rx="8" fill="#14182a" stroke="#5a4fc0" stroke-width="1.5"/>
  <text x="976" y="244" fill="#9a8fff" font-size="12" text-anchor="middle" font-weight="700">SENTENCE / ÖBEK  (π-addressed)</text>
  <text x="976" y="260" fill="#6b7080" font-size="11" text-anchor="middle">{text · ids · ts · season · conv · pi · role}</text>
  <text x="976" y="275" fill="#555a6a" font-size="10" text-anchor="middle">θ_k = 2π · frac(k/φ)  →  unique position in memory space</text>

  <line x1="976" y1="278" x2="976" y2="298" stroke="#252830" stroke-width="1.5"/>
  <text x="976" y="294" fill="#555a6a" font-size="10" text-anchor="middle">roll-up by conv_id</text>

  <!-- Level 2: conversation -->
  <rect x="812" y="300" width="328" height="54" rx="8" fill="#0f2028" stroke="#4caf82" stroke-width="1.5"/>
  <text x="976" y="320" fill="#4caf82" font-size="12" text-anchor="middle" font-weight="700">CONVERSATION (conv2chunk)</text>
  <text x="976" y="336" fill="#6b7080" font-size="11" text-anchor="middle">conv_id → [sentence ids]  →  cscore</text>
  <text x="976" y="352" fill="#555a6a" font-size="10" text-anchor="middle">cscore = best_hit + 0.4 · Σ(sibling scores)</text>

  <!-- arrow to recall output -->
  <line x1="976" y1="354" x2="976" y2="374" stroke="#4caf82" stroke-width="1.5"/>

  <!-- Recall output -->
  <rect x="812" y="376" width="328" height="62" rx="8" fill="#0d1a10" stroke="#4caf82" stroke-width="1"/>
  <text x="976" y="396" fill="#4caf82" font-size="11" text-anchor="middle" font-weight="700">RECALL OUTPUT → LLM PROMPT</text>
  <text x="976" y="412" fill="#6b7080" font-size="11" text-anchor="middle">top conversation selected by cscore</text>
  <text x="976" y="428" fill="#6b7080" font-size="11" text-anchor="middle">its öbeks returned (matched first, siblings after)</text>
  <text x="976" y="442" fill="#555a6a" font-size="10.5" text-anchor="middle">months-old chat surfaces whole — not just one sentence</text>

  <!-- Data structure note -->
  <rect x="812" y="454" width="328" height="58" rx="8" fill="#0a0d14" stroke="#252830"/>
  <text x="818" y="472" fill="#8b90a0" font-size="11" font-weight="600">Key data structures</text>
  <text x="818" y="489" fill="#555a6a" font-size="10.5">node2chunk{i: set}  →  concept to its sentences</text>
  <text x="818" y="504" fill="#555a6a" font-size="10.5">conv2chunk{cv:[ids]}  →  conversation to its sentences</text>

  <!-- Benchmark results -->
  <rect x="812" y="524" width="328" height="98" rx="8" fill="#0d1020" stroke="#7c6cf0" stroke-width="1"/>
  <text x="976" y="544" fill="#8b90a0" font-size="11" text-anchor="middle" font-weight="700">BENCHMARK — 500 turns / 50 facts</text>
  <line x1="812" y1="551" x2="1140" y2="551" stroke="#1e2028" stroke-width="1"/>

  <text x="888" y="572" fill="#a59fff" font-size="26" font-weight="800" text-anchor="middle">96%</text>
  <text x="888" y="590" fill="#8b90a0" font-size="10.5" text-anchor="middle">memory recall</text>
  <text x="888" y="606" fill="#555a6a" font-size="10" text-anchor="middle">(top-5, all queries)</text>

  <line x1="976" y1="558" x2="976" y2="618" stroke="#1e2028" stroke-width="1"/>

  <text x="1062" y="572" fill="#4caf82" font-size="26" font-weight="800" text-anchor="middle">100%</text>
  <text x="1062" y="590" fill="#8b90a0" font-size="10.5" text-anchor="middle">end-to-end</text>
  <text x="1062" y="606" fill="#555a6a" font-size="10" text-anchor="middle">(sampled, LLM answer)</text>
</svg>
