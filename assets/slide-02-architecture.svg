<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif">
  <defs>
    <marker id="av" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#7c6cf0"/>
    </marker>
    <marker id="ag" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#4caf82"/>
    </marker>
    <marker id="ao" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#f0a030"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#0d0f14"/>
  <rect width="1200" height="4" fill="#7c6cf0"/>

  <!-- TITLE -->
  <text x="60" y="62" fill="#e8eaf0" font-size="34" font-weight="800" letter-spacing="-0.5">System Architecture</text>
  <text x="60" y="87" fill="#5e6375" font-size="13.5">QCognitiveLayer — request flow from message to streamed answer</text>
  <text x="1140" y="62" fill="#252830" font-size="12" text-anchor="end">2 / 3</text>
  <line x1="60" y1="103" x2="1140" y2="103" stroke="#1a1e28"/>

  <!-- ══ LEFT COLUMN: 5 steps (x=38-420) ══ -->

  <!-- SYNC label strip -->
  <rect x="38" y="112" width="382" height="22" rx="4" fill="#151226"/>
  <text x="229" y="127" text-anchor="middle" fill="#7c6cf0" font-size="10" font-weight="700" letter-spacing="1.2">SYNCHRONOUS — blocks until complete</text>

  <!-- Step 1: User message  y=138-184 -->
  <rect x="38" y="138" width="382" height="46" rx="8" fill="#131520" stroke="#7c6cf0" stroke-width="1.5"/>
  <circle cx="62" cy="161" r="13" fill="#1c2040"/>
  <text x="62" y="166" text-anchor="middle" fill="#a59fff" font-size="12" font-weight="800">①</text>
  <text x="86" y="158" fill="#d0d3dc" font-size="13" font-weight="600">User message</text>
  <text x="86" y="175" fill="#5a5e70" font-size="11.5">"What did Alice say about the job offer?"</text>

  <!-- Arrow 1→2 -->
  <line x1="229" y1="184" x2="229" y2="200" stroke="#7c6cf0" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- Step 2: Memory.recall()  y=202-300 -->
  <rect x="38" y="202" width="382" height="98" rx="8" fill="#131520" stroke="#7c6cf0" stroke-width="1.5"/>
  <circle cx="62" cy="226" r="13" fill="#1c2040"/>
  <text x="62" y="231" text-anchor="middle" fill="#a59fff" font-size="12" font-weight="800">②</text>
  <text x="86" y="222" fill="#a59fff" font-size="13" font-weight="600">Memory.recall( query, hops=3 )</text>
  <line x1="80" y1="231" x2="412" y2="231" stroke="#1e2230"/>
  <text x="88" y="247" fill="#5a5e70" font-size="11.5">a. token → lemma → exact / fuzzy seed</text>
  <text x="88" y="263" fill="#5a5e70" font-size="11.5">b. spreading activation on bond graph</text>
  <text x="88" y="279" fill="#5a5e70" font-size="11.5">c. IDF saliency + conversation hierarchy</text>
  <text x="88" y="295" fill="#5a5e70" font-size="11.5">d. return top-k öbeks → inject to prompt</text>

  <!-- Arrow 2→3 -->
  <line x1="229" y1="300" x2="229" y2="316" stroke="#7c6cf0" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- Step 3: Prompt Builder  y=318-396 -->
  <rect x="38" y="318" width="382" height="78" rx="8" fill="#131520" stroke="#7c6cf0" stroke-width="1.5"/>
  <circle cx="62" cy="342" r="13" fill="#1c2040"/>
  <text x="62" y="347" text-anchor="middle" fill="#a59fff" font-size="12" font-weight="800">③</text>
  <text x="86" y="338" fill="#a59fff" font-size="13" font-weight="600">Prompt Builder</text>
  <line x1="80" y1="347" x2="412" y2="347" stroke="#1e2230"/>
  <text x="88" y="363" fill="#5a5e70" font-size="11.5">system (EN/TR) + recalled memory snippets</text>
  <text x="88" y="379" fill="#5a5e70" font-size="11.5">+ last 60 Q-A verbatim + new message</text>
  <text x="88" y="393" fill="#5a5e70" font-size="11">⟶ single prompt string to LLM router</text>

  <!-- Arrow 3→4 -->
  <line x1="229" y1="396" x2="229" y2="412" stroke="#7c6cf0" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- Step 4: LLM Router  y=414-470 -->
  <rect x="38" y="414" width="382" height="56" rx="8" fill="#131520" stroke="#7c6cf0" stroke-width="1.5"/>
  <circle cx="62" cy="438" r="13" fill="#1c2040"/>
  <text x="62" y="443" text-anchor="middle" fill="#a59fff" font-size="12" font-weight="800">④</text>
  <text x="86" y="434" fill="#a59fff" font-size="13" font-weight="600">LLM Router  (streaming)</text>
  <line x1="80" y1="443" x2="412" y2="443" stroke="#1e2230"/>
  <text x="88" y="459" fill="#5a5e70" font-size="11.5">Gemini SSE or Ollama NDJSON → delta stream</text>
  <text x="88" y="472" fill="#5a5e70" font-size="11">answer delivered to client while streaming</text>

  <!-- Answer arc back to user (left side) -->
  <path d="M 38 442 Q 16 442 16 161 Q 16 138 38 138" stroke="#4caf82" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#ag)"/>

  <!-- ASYNC separator -->
  <line x1="38" y1="496" x2="420" y2="496" stroke="#1e2230" stroke-dasharray="3,3"/>
  <text x="229" y="510" text-anchor="middle" fill="#f0a030" font-size="10" font-weight="700" letter-spacing="1">BACKGROUND THREAD — non-blocking</text>

  <!-- Step 5: _learn_bg  y=518-618 -->
  <rect x="38" y="518" width="382" height="100" rx="8" fill="#131520" stroke="#f0a030" stroke-width="1.5" stroke-dasharray="6,3"/>
  <circle cx="62" cy="542" r="13" fill="#241c10"/>
  <text x="62" y="547" text-anchor="middle" fill="#f0c060" font-size="12" font-weight="800">⑤</text>
  <text x="86" y="538" fill="#f0c060" font-size="13" font-weight="600">_learn_bg  (background thread)</text>
  <line x1="80" y1="547" x2="412" y2="547" stroke="#2a2010"/>
  <text x="88" y="563" fill="#5a5e70" font-size="11.5">Memory.remember( user_msg + assistant_reply )</text>
  <text x="88" y="579" fill="#5a5e70" font-size="11.5">MEM.save( checkpoint.pkl )   ← atomic write</text>
  <text x="88" y="595" fill="#5a5e70" font-size="11.5">autonomous.scan( query, steps=10, hops=hops-1 )</text>
  <text x="88" y="611" fill="#4a4e60" font-size="11">no lock held while streaming — never delays answer</text>

  <!-- ══ RIGHT PANEL: Memory Graph + Öbeks (x=440-1160) ══ -->
  <rect x="440" y="112" width="720" height="553" rx="12" fill="#0c0e16" stroke="#1e2230" stroke-width="1.5"/>
  <rect x="440" y="112" width="720" height="40" rx="12" fill="#141828"/>
  <rect x="440" y="140" width="720" height="12" fill="#141828"/>
  <text x="800" y="137" text-anchor="middle" fill="#a59fff" font-size="12" font-weight="700" letter-spacing="0.8">MEMORY GRAPH — izolojik connectome</text>

  <!-- Read arrow (step ② reads from graph) -->
  <line x1="441" y1="253" x2="422" y2="253" stroke="#7c6cf0" stroke-width="1.5" marker-end="url(#av)"/>
  <text x="432" y="246" text-anchor="middle" fill="#7c6cf0" font-size="9">read</text>

  <!-- Write arrow (step ⑤ writes to graph) -->
  <line x1="422" y1="580" x2="441" y2="580" stroke="#f0a030" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="432" y="573" text-anchor="middle" fill="#f0a030" font-size="9">write</text>

  <!-- GRAPH section (x=460-840, y=160-480) -->

  <!-- bond lines (draw first, behind nodes) -->
  <g stroke="#1e2a44" stroke-width="2">
    <line x1="655" y1="315" x2="568" y2="258"/>
    <line x1="655" y1="315" x2="742" y2="260"/>
    <line x1="655" y1="315" x2="598" y2="396"/>
    <line x1="568" y1="258" x2="500" y2="308"/>
    <line x1="742" y1="260" x2="810" y2="305"/>
    <line x1="598" y1="396" x2="540" y2="443"/>
    <line x1="742" y1="260" x2="726" y2="375"/>
    <line x1="500" y1="308" x2="472" y2="372"/>
  </g>

  <!-- glows -->
  <circle cx="655" cy="315" r="40" fill="#7c6cf0" opacity="0.09"/>
  <circle cx="568" cy="258" r="26" fill="#5a4fc0" opacity="0.1"/>
  <circle cx="742" cy="260" r="26" fill="#5a4fc0" opacity="0.1"/>

  <!-- nodes -->
  <circle cx="655" cy="315" r="24" fill="#7c6cf0"/>
  <circle cx="568" cy="258" r="16" fill="#4a40a8"/>
  <circle cx="742" cy="260" r="16" fill="#4a40a8"/>
  <circle cx="598" cy="396" r="13" fill="#363070"/>
  <circle cx="500" cy="308" r="10" fill="#22283a"/>
  <circle cx="810" cy="305" r="10" fill="#22283a"/>
  <circle cx="540" cy="443" r="8"  fill="#1c2030"/>
  <circle cx="726" cy="375" r="10" fill="#22283a"/>
  <circle cx="472" cy="372" r="8"  fill="#1c2030"/>

  <!-- node labels — placed so none overlap each other -->
  <text x="655" y="310" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">seed</text>
  <text x="655" y="323" text-anchor="middle" fill="#c8c4ff" font-size="9">alice</text>

  <text x="535" y="248" text-anchor="middle" fill="#a09ae8" font-size="9.5">job</text>
  <text x="776" y="250" text-anchor="middle" fill="#a09ae8" font-size="9.5">offer</text>
  <text x="598" y="416" text-anchor="middle" fill="#7070a0" font-size="9">london</text>

  <text x="480" y="298" text-anchor="middle" fill="#4a4e68" font-size="8.5">work</text>
  <text x="835" y="300" text-anchor="middle" fill="#4a4e68" font-size="8.5">career</text>
  <text x="516" y="453" text-anchor="middle" fill="#3a3e52" font-size="8">studio</text>
  <text x="748" y="390" text-anchor="middle" fill="#3a3e52" font-size="8">design</text>
  <text x="455" y="376" text-anchor="middle" fill="#3a3e52" font-size="8">move</text>

  <!-- activation labels -->
  <text x="655" y="358" text-anchor="middle" fill="#7c6cf0" font-size="10" font-weight="600">act=1.0 (seed)</text>
  <text x="568" y="284" text-anchor="middle" fill="#4a40a8" font-size="9">act=0.74</text>
  <text x="742" y="285" text-anchor="middle" fill="#4a40a8" font-size="9">act=0.71</text>

  <!-- graph footer label -->
  <text x="650" y="472" text-anchor="middle" fill="#2c3040" font-size="11">spreading activation · cohf=1 · Hebbian bonds</text>

  <!-- DIVIDER between graph and öbeks -->
  <line x1="848" y1="154" x2="848" y2="652" stroke="#1a1e28"/>

  <!-- ÖBEKS SECTION (x=864-1152) -->
  <text x="1008" y="172" text-anchor="middle" fill="#4a5068" font-size="11" font-weight="700" letter-spacing="0.8">RECALLED SENTENCES (öbeks)</text>

  <!-- öbek 1: best match -->
  <rect x="862" y="183" width="278" height="64" rx="7" fill="#141a2e" stroke="#7c6cf0"/>
  <rect x="862" y="183" width="278" height="20" rx="7" fill="#1c2438"/>
  <rect x="862" y="195" width="278" height="8" fill="#1c2438"/>
  <text x="870" y="197" fill="#a59fff" font-size="9.5" font-weight="700">BEST MATCH  ·  π-addr 0.618…</text>
  <text x="870" y="213" fill="#d0d3dc" font-size="11.5">"Alice got a job offer in London."</text>
  <text x="870" y="228" fill="#3a4058" font-size="10">[user · 2025-11-14]  direct seed hit</text>
  <text x="870" y="242" fill="#3a4058" font-size="10">score 2.41  ·  seeds: alice, job, offer</text>

  <!-- öbek 2: sibling -->
  <rect x="862" y="256" width="278" height="56" rx="7" fill="#111420" stroke="#303448"/>
  <text x="870" y="272" fill="#5a6080" font-size="9.5">sibling  ·  π-addr 1.236…</text>
  <text x="870" y="287" fill="#b0b3c0" font-size="11.5">"She's been weighing the decision."</text>
  <text x="870" y="302" fill="#3a3e52" font-size="10">[user · 2025-11-14]  same conversation</text>

  <!-- öbek 3: sibling -->
  <rect x="862" y="320" width="278" height="56" rx="7" fill="#111420" stroke="#303448"/>
  <text x="870" y="336" fill="#5a6080" font-size="9.5">sibling  ·  π-addr 1.854…</text>
  <text x="870" y="351" fill="#b0b3c0" font-size="11.5">"The role is at a design studio."</text>
  <text x="870" y="366" fill="#3a3e52" font-size="10">[assistant · 2025-11-14]</text>

  <!-- not-surfaced: low score -->
  <rect x="862" y="386" width="278" height="38" rx="7" fill="#0d0f14" stroke="#1e2028" stroke-dasharray="3,2"/>
  <text x="1001" y="403" text-anchor="middle" fill="#222630" font-size="11">"It rained in Boston yesterday."</text>
  <text x="1001" y="418" text-anchor="middle" fill="#1c2028" font-size="10">score too low — not surfaced</text>

  <!-- arrow roll-up to conversation -->
  <line x1="1001" y1="424" x2="1001" y2="448" stroke="#4caf82" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- conversation box -->
  <rect x="862" y="450" width="278" height="68" rx="8" fill="#0d1e14" stroke="#4caf82" stroke-width="1.5"/>
  <text x="1001" y="470" text-anchor="middle" fill="#4caf82" font-size="11.5" font-weight="700">CONVERSATION FOCUS</text>
  <text x="1001" y="487" text-anchor="middle" fill="#7a9090" font-size="10.5">"alice-career-chat" · 2025-11-14</text>
  <text x="1001" y="503" text-anchor="middle" fill="#3a5040" font-size="10">3 öbeks injected into LLM prompt</text>
  <text x="1001" y="517" text-anchor="middle" fill="#3a5040" font-size="10">cscore = 2.41 + 0.4·(1.05+0.88)</text>

  <!-- LEGEND (bottom of right panel) -->
  <rect x="458" y="536" width="370" height="80" rx="8" fill="#09090f" stroke="#1a1e28"/>
  <text x="474" y="554" fill="#4a5068" font-size="10.5" font-weight="700">LEGEND</text>
  <rect x="474" y="562" width="22" height="3" fill="#7c6cf0"/>
  <text x="502" y="566" fill="#404560" font-size="10.5">synchronous path — blocks response</text>
  <rect x="474" y="576" width="22" height="3" fill="#f0a030"/>
  <text x="502" y="580" fill="#404560" font-size="10.5">background thread — never blocks</text>
  <rect x="474" y="590" width="22" height="3" fill="#4caf82"/>
  <text x="502" y="594" fill="#404560" font-size="10.5">answer streamed to client</text>
  <text x="474" y="608" fill="#2a2e40" font-size="10">lock only acquired if background thread still running on next request</text>
</svg>
