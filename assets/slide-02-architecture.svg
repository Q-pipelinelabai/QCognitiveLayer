<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#7c6cf0"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4caf82"/>
    </marker>
    <marker id="arr3" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#f0a030"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#0d0f14"/>
  <rect width="1200" height="4" fill="#7c6cf0"/>

  <!-- TITLE -->
  <text x="60" y="60" fill="#e8eaf0" font-size="32" font-weight="800">System Architecture</text>
  <text x="60" y="88" fill="#8b90a0" font-size="14">Request → Recall → Inject → Stream → Learn (background)</text>
  <text x="1140" y="60" fill="#252830" font-size="13" text-anchor="end">slide 2 / 3</text>
  <line x1="60" y1="105" x2="1140" y2="105" stroke="#1e2028" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- SYNC LANE (left column, steps 1-4) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="115" width="12" height="430" rx="6" fill="#7c6cf0" opacity="0.25"/>
  <text x="14" y="340" fill="#7c6cf0" font-size="11" font-weight="700" transform="rotate(-90,14,340)" text-anchor="middle" letter-spacing="2">SYNCHRONOUS — blocks until done</text>

  <!-- STEP 1: USER -->
  <rect x="55" y="122" width="300" height="52" rx="8" fill="#13151c" stroke="#7c6cf0" stroke-width="1.5"/>
  <circle cx="84" cy="148" r="14" fill="#1e2138"/>
  <text x="84" y="153" fill="#a59fff" font-size="14" text-anchor="middle" font-weight="700">U</text>
  <text x="108" y="143" fill="#e8eaf0" font-size="14" font-weight="600">User message</text>
  <text x="108" y="162" fill="#8b90a0" font-size="12">"What is my daughter's name?"</text>
  <circle cx="340" cy="148" r="10" fill="#1a1c26" stroke="#7c6cf0" stroke-width="1"/>
  <text x="340" y="153" fill="#a59fff" font-size="11" text-anchor="middle" font-weight="700">①</text>

  <!-- arrow down -->
  <line x1="205" y1="174" x2="205" y2="196" stroke="#7c6cf0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 2: RECALL -->
  <rect x="55" y="198" width="300" height="112" rx="8" fill="#13151c" stroke="#7c6cf0" stroke-width="1.5"/>
  <text x="80" y="222" fill="#a59fff" font-size="13" font-weight="700">② Memory.recall(query)</text>
  <line x1="75" y1="230" x2="345" y2="230" stroke="#252830" stroke-width="1"/>
  <text x="80" y="248" fill="#6b7080" font-size="12">a. query → exact / lemma / fuzzy seeds</text>
  <text x="80" y="266" fill="#6b7080" font-size="12">b. spreading activation (hops=3, cohf=1)</text>
  <text x="80" y="284" fill="#6b7080" font-size="12">c. IDF saliency · seed-anchored scoring</text>
  <text x="80" y="300" fill="#6b7080" font-size="12">d. conversation focus → content dive</text>
  <circle cx="340" cy="252" r="10" fill="#1a1c26" stroke="#7c6cf0" stroke-width="1"/>

  <!-- arrow down -->
  <line x1="205" y1="310" x2="205" y2="332" stroke="#7c6cf0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 3: PROMPT BUILDER -->
  <rect x="55" y="334" width="300" height="90" rx="8" fill="#13151c" stroke="#7c6cf0" stroke-width="1.5"/>
  <text x="80" y="358" fill="#a59fff" font-size="13" font-weight="700">③ Prompt Builder</text>
  <line x1="75" y1="366" x2="345" y2="366" stroke="#252830" stroke-width="1"/>
  <text x="80" y="383" fill="#6b7080" font-size="12">system (EN/TR)  +  recalled memory</text>
  <text x="80" y="400" fill="#6b7080" font-size="12">+  last 60 Q-A verbatim  +  new message</text>
  <circle cx="340" cy="378" r="10" fill="#1a1c26" stroke="#7c6cf0" stroke-width="1"/>

  <!-- arrow down -->
  <line x1="205" y1="424" x2="205" y2="446" stroke="#7c6cf0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 4: LLM ROUTER -->
  <rect x="55" y="448" width="300" height="84" rx="8" fill="#13151c" stroke="#7c6cf0" stroke-width="1.5"/>
  <text x="80" y="472" fill="#a59fff" font-size="13" font-weight="700">④ LLM Router</text>
  <line x1="75" y1="480" x2="345" y2="480" stroke="#252830" stroke-width="1"/>
  <text x="162" y="498" fill="#6b7080" font-size="13" text-anchor="middle">Gemini</text>
  <line x1="200" y1="488" x2="200" y2="524" stroke="#252830" stroke-width="1"/>
  <text x="248" y="498" fill="#6b7080" font-size="13" text-anchor="middle">Ollama</text>
  <text x="80" y="518" fill="#555a6a" font-size="11.5">streaming (SSE / NDJSON) → user</text>
  <circle cx="340" cy="490" r="10" fill="#1a1c26" stroke="#7c6cf0" stroke-width="1"/>

  <!-- ANSWER back to user -->
  <path d="M 55 490 Q 30 490 30 570 Q 30 600 55 600" stroke="#4caf82" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arr2)"/>
  <text x="20" y="538" fill="#4caf82" font-size="11" transform="rotate(-90,20,538)" text-anchor="middle">answer streams</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ASYNC LANE (background thread) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="555" width="12" height="90" rx="6" fill="#f0a030" opacity="0.25"/>
  <text x="14" y="600" fill="#f0a030" font-size="11" font-weight="700" transform="rotate(-90,14,600)" text-anchor="middle" letter-spacing="2">ASYNC</text>

  <rect x="55" y="558" width="300" height="85" rx="8" fill="#13151c" stroke="#f0a030" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="80" y="581" fill="#f0c060" font-size="13" font-weight="700">⑤ _learn_bg  (background thread)</text>
  <line x1="75" y1="588" x2="345" y2="588" stroke="#252830" stroke-width="1"/>
  <text x="80" y="605" fill="#6b7080" font-size="12">Memory.remember(user + assistant)</text>
  <text x="80" y="622" fill="#6b7080" font-size="12">MEM.save(checkpoint) + autonomous.scan()</text>
  <circle cx="340" cy="600" r="10" fill="#1a1c26" stroke="#f0a030" stroke-width="1"/>

  <!-- ASYNC label -->
  <text x="205" y="551" fill="#f0a030" font-size="11" text-anchor="middle" font-weight="600">fired after answer, does NOT block response</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- MEMORY GRAPH (right panel) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="420" y="122" width="728" height="522" rx="12" fill="#0f1118" stroke="#252830" stroke-width="1.5"/>

  <!-- Memory graph title -->
  <rect x="420" y="122" width="728" height="44" rx="12" fill="#14172a"/>
  <rect x="420" y="152" width="728" height="14" fill="#14172a"/>
  <text x="784" y="150" fill="#a59fff" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="1">MEMORY GRAPH (izolojik connectome)</text>

  <!-- Read arrow from Memory to Recall (step 2) -->
  <line x1="420" y1="275" x2="357" y2="275" stroke="#7c6cf0" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="388" y="270" fill="#7c6cf0" font-size="10" text-anchor="middle">read</text>

  <!-- Write arrow from learn_bg to Memory -->
  <line x1="357" y1="600" x2="420" y2="550" stroke="#f0a030" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arr3)"/>
  <text x="388" y="582" fill="#f0a030" font-size="10" text-anchor="middle">write</text>

  <!-- ---- node visualization ---- -->
  <!-- Bond lines -->
  <g stroke="#2a2f40" stroke-width="1.5">
    <line x1="600" y1="300" x2="680" y2="260"/>
    <line x1="680" y1="260" x2="780" y2="290"/>
    <line x1="780" y1="290" x2="860" y2="250"/>
    <line x1="680" y1="260" x2="660" y2="370"/>
    <line x1="780" y1="290" x2="800" y2="390"/>
    <line x1="660" y1="370" x2="800" y2="390"/>
    <line x1="800" y1="390" x2="900" y2="360"/>
    <line x1="860" y1="250" x2="960" y2="280"/>
    <line x1="900" y1="360" x2="960" y2="280"/>
    <line x1="660" y1="370" x2="580" y2="430"/>
    <line x1="800" y1="390" x2="820" y2="460"/>
    <line x1="900" y1="360" x2="980" y2="420"/>
  </g>

  <!-- Glow on active nodes -->
  <circle cx="680" cy="260" r="34" fill="#7c6cf0" opacity="0.12"/>
  <circle cx="780" cy="290" r="28" fill="#7c6cf0" opacity="0.10"/>

  <!-- Concept nodes -->
  <circle cx="600" cy="300" r="12" fill="#1e2138" stroke="#3a3f58"/>
  <circle cx="680" cy="260" r="18" fill="#7c6cf0"/>
  <circle cx="780" cy="290" r="15" fill="#5a4fc0"/>
  <circle cx="860" cy="250" r="11" fill="#4a4c68" stroke="#6a6c88"/>
  <circle cx="660" cy="370" r="13" fill="#5a4fc0"/>
  <circle cx="800" cy="390" r="13" fill="#4a4c68" stroke="#6a6c88"/>
  <circle cx="900" cy="360" r="10" fill="#2a2f40"/>
  <circle cx="960" cy="280" r="9" fill="#2a2f40"/>
  <circle cx="580" cy="430" r="8" fill="#2a2f40"/>
  <circle cx="820" cy="460" r="8" fill="#2a2f40"/>
  <circle cx="980" cy="420" r="8" fill="#2a2f40"/>

  <!-- Node labels -->
  <text x="680" y="243" fill="#e8eaf0" font-size="11" font-weight="700" text-anchor="middle">seed</text>
  <text x="780" y="310" fill="#ccc8ff" font-size="10" text-anchor="middle">hop-1</text>
  <text x="660" y="390" fill="#ccc8ff" font-size="10" text-anchor="middle">hop-1</text>

  <!-- IDF label on seed node -->
  <rect x="695" y="230" width="90" height="20" rx="4" fill="#1a1c30"/>
  <text x="740" y="244" fill="#a59fff" font-size="10" text-anchor="middle">high IDF (rare)</text>

  <!-- ---- öbek list (right side of memory panel) ---- -->
  <rect x="1040" y="178" width="94" height="26" rx="6" fill="#1a2030"/>
  <text x="1087" y="195" fill="#a59fff" font-size="11" text-anchor="middle" font-weight="700">SENTENCES (öbek)</text>

  <rect x="1000" y="178" width="2" height="430" fill="#1e2028"/>

  <rect x="1010" y="215" width="118" height="46" rx="6" fill="#1a2038" stroke="#7c6cf0" stroke-width="1"/>
  <text x="1019" y="232" fill="#ccc8ff" font-size="10.5" font-weight="600">π: 0.618… [user]</text>
  <text x="1019" y="248" fill="#8b90a0" font-size="10">My daughter is Elif...</text>
  <text x="1019" y="261" fill="#555a6a" font-size="9.5">★ high score (direct seed)</text>

  <rect x="1010" y="270" width="118" height="46" rx="6" fill="#13151c" stroke="#252830"/>
  <text x="1019" y="287" fill="#6b7080" font-size="10.5">π: 1.236… [user]</text>
  <text x="1019" y="303" fill="#6b7080" font-size="10">She works as a doctor...</text>
  <text x="1019" y="316" fill="#555a6a" font-size="9.5">★★ sibling — same conv</text>

  <rect x="1010" y="325" width="118" height="46" rx="6" fill="#13151c" stroke="#252830"/>
  <text x="1019" y="342" fill="#6b7080" font-size="10.5">π: 1.854… [asst]</text>
  <text x="1019" y="358" fill="#6b7080" font-size="10">Noted, Elif the doctor...</text>
  <text x="1019" y="371" fill="#555a6a" font-size="9.5">★ sibling — same conv</text>

  <rect x="1010" y="380" width="118" height="38" rx="6" fill="#0e1018" stroke="#1e2028" stroke-dasharray="3,2"/>
  <text x="1069" y="397" fill="#3a3f50" font-size="10" text-anchor="middle">low score</text>
  <text x="1069" y="411" fill="#3a3f50" font-size="9.5" text-anchor="middle">(not recalled)</text>

  <!-- CONVERSATION ROLL-UP ARROW -->
  <path d="M 1069 426 L 1069 455 L 1080 455 L 1080 490" stroke="#4caf82" stroke-width="1.5" fill="none" marker-end="url(#arr2)"/>
  <text x="1100" y="445" fill="#4caf82" font-size="10.5">roll-up</text>

  <!-- Conversation box -->
  <rect x="1010" y="492" width="118" height="60" rx="6" fill="#0f2018" stroke="#4caf82" stroke-width="1.5"/>
  <text x="1069" y="511" fill="#4caf82" font-size="11" font-weight="700" text-anchor="middle">CONVERSATION</text>
  <text x="1069" y="527" fill="#8b90a0" font-size="10" text-anchor="middle">"family chat"</text>
  <text x="1069" y="541" fill="#555a6a" font-size="9.5" text-anchor="middle">3 sentences returned</text>

  <!-- Hybrid continuity note -->
  <rect x="435" y="480" width="540" height="60" rx="8" fill="#0a0d18" stroke="#252830"/>
  <text x="705" y="502" fill="#8b90a0" font-size="12" text-anchor="middle" font-weight="600">HYBRID CONTINUITY</text>
  <text x="705" y="520" fill="#6b7080" font-size="11.5" text-anchor="middle">Recalled memory (long-term, cross-session, selective)  +  last 60 Q-A verbatim (current chat)</text>
  <text x="705" y="536" fill="#555a6a" font-size="11" text-anchor="middle">Context window never bloats. Months-old facts still surface.</text>

  <!-- Legend -->
  <rect x="435" y="550" width="540" height="78" rx="8" fill="#0a0d14" stroke="#1e2028"/>
  <text x="455" y="572" fill="#8b90a0" font-size="11" font-weight="700">LEGEND</text>
  <rect x="455" y="582" width="12" height="3" fill="#7c6cf0"/>
  <text x="475" y="589" fill="#6b7080" font-size="11">synchronous (blocks response)</text>
  <rect x="455" y="598" width="12" height="3" fill="#f0a030"/>
  <text x="475" y="605" fill="#6b7080" font-size="11">async background (never blocks)</text>
  <rect x="455" y="614" width="12" height="3" fill="#4caf82"/>
  <text x="475" y="621" fill="#6b7080" font-size="11">answer / data flow to user</text>
  <text x="760" y="589" fill="#6b7080" font-size="11">● large node = high IDF (specific, rare concept)</text>
  <text x="760" y="605" fill="#6b7080" font-size="11">● glow = spreading activation active</text>
  <text x="760" y="621" fill="#6b7080" font-size="11">★ öbek score = direct + 0.6·assoc / √len · recency</text>
</svg>
